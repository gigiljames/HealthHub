name: "HealthHub backend CI/CD"

on:
  push:
    branches: [ "main" ]
    paths:
      - "Backend/**"
      - "backend/**"
      - ".github/workflows/deploy.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: DockerHub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Dockerfile
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/healthhub-backend ./Backend

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/healthhub-backend
