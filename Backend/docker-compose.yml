services:
  backend:
    image: gigiljames/healthhub-backend
    container_name: healthhub-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    # env_file:
    #   - .env
    environment:
      PORT: ${PORT}
      NODEMAILER_USER: ${NODEMAILER_USER}
      NODEMAILER_PASS: ${NODEMAILER_PASS}
      FRONTEND_URL: ${FRONTEND_URL}
      MONGODB_URL: ${MONGODB_URL}
      OTP_EXPIRY: ${OTP_EXPIRY}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_SIGNED_ACCESS_URL_EXPIRY: ${AWS_SIGNED_ACCESS_URL_EXPIRY}
      AWS_SIGNED_UPLOAD_URL_EXPIRY: ${AWS_SIGNED_UPLOAD_URL_EXPIRY}
      MAX_SLOT_DAYS: ${MAX_SLOT_DAYS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SLOT_LOCK_EXPIRY_MS: ${SLOT_LOCK_EXPIRY_MS}
      PLATFORM_COMMISSION: ${PLATFORM_COMMISSION}
      FIXED_PLATFORM_FEE: ${FIXED_PLATFORM_FEE}
      DOCTOR_PAYOUT_CRON_RULE: ${DOCTOR_PAYOUT_CRON_RULE}
      LOCK_SWEEPER_CRON_RULE: ${LOCK_SWEEPER_CRON_RULE}
      AUTO_NO_SHOW_CRON_RULE: ${AUTO_NO_SHOW_CRON_RULE}
    volumes:
      - backend_logs:/app/logs

  prometheus:
    image: prom/prometheus:latest
    container_name: healthhub-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: healthhub-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      
volumes:
  backend_logs:
  prometheus_data:
  grafana_data:
